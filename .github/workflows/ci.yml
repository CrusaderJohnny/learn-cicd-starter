name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Check get_api_key Tests
        run: go test ./... -cover

  formatting:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check Go FMT
        run: test -z $(go fmt ./...)

      - name: Install Static check
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Static check
        run: test -z $(staticcheck ./...)